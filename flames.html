<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FLAMES Game</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4, #ffecd2, #a1c4fd, #c2e9fb);
    background-size: 400% 400%;
    animation: gradientBG 8s ease infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  @keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border-radius: 24px;
    padding: 2.5rem 2rem;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    text-align: center;
  }
  .title {
    font-size: 3rem;
    font-weight: 800;
    letter-spacing: 10px;
    background: linear-gradient(90deg, #f857a6, #ff5858, #f857a6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.25rem;
  }
  .subtitle {
    font-size: 11px;
    color: #999;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }
  .flames-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 1.8rem;
    flex-wrap: wrap;
  }
  .fl {
    width: 50px; height: 50px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
    border: 2.5px solid;
    transition: all 0.3s ease;
  }
  .fl.F { background:#FAECE7; color:#993C1D; border-color:#D85A30; }
  .fl.L { background:#FBEAF0; color:#993556; border-color:#D4537E; }
  .fl.A { background:#EEEDFE; color:#534AB7; border-color:#7F77DD; }
  .fl.M { background:#E1F5EE; color:#0F6E56; border-color:#1D9E75; }
  .fl.E { background:#FAEEDA; color:#854F0B; border-color:#BA7517; }
  .fl.S { background:#E6F1FB; color:#185FA5; border-color:#378ADD; }
  .fl.crossed { opacity: 0.2; transform: scale(0.8); }
  .fl.active { transform: scale(1.25); box-shadow: 0 0 0 4px rgba(248,87,166,0.3); }
  .inp-group { margin-bottom: 1rem; text-align: left; }
  .inp-group label { font-size: 13px; font-weight: 600; color: #666; margin-bottom: 5px; display: block; }
  .inp-group input {
    width: 100%; padding: 12px 16px;
    border-radius: 12px;
    border: 1.5px solid #e0e0e0;
    font-size: 15px;
    outline: none;
    transition: border 0.2s;
    background: white;
  }
  .inp-group input:focus { border-color: #f857a6; box-shadow: 0 0 0 3px rgba(248,87,166,0.15); }
  .btn {
    width: 100%; padding: 14px;
    border-radius: 14px; border: none;
    background: linear-gradient(135deg, #f857a6, #ff5858);
    color: white; font-size: 16px; font-weight: 700;
    cursor: pointer; margin-top: 0.5rem;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(248,87,166,0.4); }
  .btn:active { transform: scale(0.97); }
  .count-info { font-size: 13px; color: #aaa; margin: 1rem 0 0.5rem; }
  .result-box {
    margin-top: 1.5rem;
    padding: 1.8rem;
    border-radius: 18px;
    border: 2px solid;
    display: none;
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn { from { transform: scale(0.6); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .result-icon { font-size: 3.5rem; margin-bottom: 0.5rem; }
  .result-label { font-size: 11px; letter-spacing: 3px; text-transform: uppercase; opacity: 0.7; margin-bottom: 0.25rem; }
  .result-word { font-size: 2.2rem; font-weight: 800; margin-bottom: 0.5rem; }
  .result-desc { font-size: 13px; opacity: 0.8; line-height: 1.6; }
  .saved-msg { display: none !important; }
  .reset-btn {
    margin-top: 1rem; padding: 9px 24px;
    border-radius: 10px; border: 1.5px solid #ddd;
    background: white; color: #666; font-size: 13px; cursor: pointer;
  }
  .reset-btn:hover { background: #f5f5f5; }
  .hearts { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden; z-index: 0; }
  .heart { position: absolute; font-size: 20px; animation: floatUp 4s ease-in infinite; opacity: 0; }
  @keyframes floatUp {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0.7; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }
  .card { position: relative; z-index: 1; }
</style>
</head>
<body>

<div class="hearts" id="hearts"></div>

<div class="card">
  <div class="title">FLAMES</div>
  <div class="subtitle">Friends · Lovers · Affectionate · Marriage · Enemies · Siblings</div>

  <div class="flames-row">
    <div class="fl F" id="fl-F">F</div>
    <div class="fl L" id="fl-L">L</div>
    <div class="fl A" id="fl-A">A</div>
    <div class="fl M" id="fl-M">M</div>
    <div class="fl E" id="fl-E">E</div>
    <div class="fl S" id="fl-S">S</div>
  </div>

  <div class="inp-group">
    <label>Your Name 💖</label>
    <input type="text" id="name1" placeholder="Enter your name" maxlength="40" />
  </div>
  <div class="inp-group">
    <label>Crush's Name 💝</label>
    <input type="text" id="name2" placeholder="Enter their name" maxlength="40" />
  </div>

  <button class="btn" onclick="calculate()">✨ Find Out Now ✨</button>

  <div class="count-info" id="count-info"></div>

  <div class="result-box" id="result-box">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-label">Your result is</div>
    <div class="result-word" id="result-word"></div>
    <div class="result-desc" id="result-desc"></div>
    <button class="reset-btn" onclick="reset()">🔄 Try Again</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://tqowtstiffprpviaeoxl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRxb3d0c3RpZmZwcnB2aWFlb3hsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNDY3NDUsImV4cCI6MjA5MTYyMjc0NX0.iPPl1dJl1Xc0cbMuw73lsnCs8mUWhjUjtq0vAC_Olfw';

const results = {
  F: { icon: '🤝', word: 'Friends', desc: 'You two make amazing best friends! Your bond is full of fun and laughter.', color: '#993C1D', bg: '#FAECE7', border: '#D85A30' },
  L: { icon: '💕', word: 'Lovers', desc: 'Romance is in the air! You share a deep and beautiful romantic connection.', color: '#993556', bg: '#FBEAF0', border: '#D4537E' },
  A: { icon: '🥰', word: 'Affectionate', desc: 'Warm, caring and sweet — your relationship is full of genuine love and warmth.', color: '#534AB7', bg: '#EEEDFE', border: '#7F77DD' },
  M: { icon: '💍', word: 'Marriage', desc: 'Wedding bells! The stars say you two are destined to be together forever!', color: '#0F6E56', bg: '#E1F5EE', border: '#1D9E75' },
  E: { icon: '⚡', word: 'Enemies', desc: 'Sparks fly — but not the romantic kind! You two clash like thunder and lightning.', color: '#854F0B', bg: '#FAEEDA', border: '#BA7517' },
  S: { icon: '👫', word: 'Siblings', desc: 'You bicker, you laugh, you would do anything for each other — just like siblings!', color: '#185FA5', bg: '#E6F1FB', border: '#378ADD' }
};

function clean(name) { return name.toLowerCase().replace(/\s/g, ''); }

function countRemaining(n1, n2) {
  const a = clean(n1).split('');
  const b = clean(n2).split('');
  const usedB = Array(b.length).fill(false);
  for (let i = 0; i < a.length; i++) {
    for (let j = 0; j < b.length; j++) {
      if (!usedB[j] && a[i] === b[j]) { usedB[j] = true; a[i] = null; break; }
    }
  }
  return a.filter(x => x !== null).length + b.filter((_, i) => !usedB[i]).length;
}

function flames(count) {
  let arr = ['F','L','A','M','E','S'];
  let idx = 0;
  while (arr.length > 1) {
    idx = (idx + count - 1) % arr.length;
    arr.splice(idx, 1);
    if (idx >= arr.length) idx = 0;
  }
  return arr[0];
}

function animateFlames(result, callback) {
  ['F','L','A','M','E','S'].forEach(l => document.getElementById('fl-'+l).classList.remove('crossed','active'));
  const count = window._count;
  let tempArr = ['F','L','A','M','E','S'];
  let tempIdx = 0;
  const steps = [];
  while (tempArr.length > 1) {
    tempIdx = (tempIdx + count - 1) % tempArr.length;
    steps.push(tempArr[tempIdx]);
    tempArr.splice(tempIdx, 1);
    if (tempIdx >= tempArr.length) tempIdx = 0;
  }
  let s = 0;
  const iv = setInterval(() => {
    if (s < steps.length) { document.getElementById('fl-'+steps[s]).classList.add('crossed'); s++; }
    else { clearInterval(iv); document.getElementById('fl-'+result).classList.add('active'); setTimeout(callback, 400); }
  }, 300);
}

async function saveToSupabase(yourName, crushName, result) {
  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/flames_results', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_KEY,
        'Authorization': 'Bearer ' + SUPABASE_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify({ your_name: yourName, crush_name: crushName, result: result })
    });
    if (res.ok) { document.getElementById('saved-msg').style.display = 'block'; }
  } catch(e) { console.error('Save failed:', e); }
}

function calculate() {
  const n1 = document.getElementById('name1').value.trim();
  const n2 = document.getElementById('name2').value.trim();
  if (!n1 || !n2) { alert('Please enter both names!'); return; }
  const count = countRemaining(n1, n2);
  window._count = count;
  const result = flames(count);
  document.getElementById('count-info').textContent = 'Common letters removed: ' + (clean(n1).length + clean(n2).length - count);
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('saved-msg').style.display = 'none';
  animateFlames(result, () => {
    const r = results[result];
    const box = document.getElementById('result-box');
    box.style.background = r.bg;
    box.style.borderColor = r.border;
    box.style.color = r.color;
    document.getElementById('result-icon').textContent = r.icon;
    document.getElementById('result-word').textContent = r.word;
    document.getElementById('result-desc').textContent = r.desc;
    box.style.display = 'block';
    saveToSupabase(n1, n2, r.word);
    spawnHearts();
  });
}

function reset() {
  document.getElementById('name1').value = '';
  document.getElementById('name2').value = '';
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('count-info').textContent = '';
  document.getElementById('saved-msg').style.display = 'none';
  ['F','L','A','M','E','S'].forEach(l => document.getElementById('fl-'+l).classList.remove('crossed','active'));
}

function spawnHearts() {
  const container = document.getElementById('hearts');
  const emojis = ['💖','💕','💗','💓','💞','✨','🌸','💫'];
  for (let i = 0; i < 15; i++) {
    const h = document.createElement('div');
    h.className = 'heart';
    h.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    h.style.left = Math.random()*100 + 'vw';
    h.style.animationDelay = Math.random()*2 + 's';
    h.style.fontSize = (14 + Math.random()*16) + 'px';
    container.appendChild(h);
    setTimeout(() => h.remove(), 4000);
  }
}

document.getElementById('name1').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('name2').focus(); });
document.getElementById('name2').addEventListener('keydown', e => { if(e.key==='Enter') calculate(); });
</script>
</body>
</html>
